name: Bump version + tag

# Manual dispatch alternative to the VERSION-file-driven auto-tag flow.
# Use this when you want a guided bump from the Actions UI instead of
# editing VERSION directly. Writes the new version to /VERSION, commits,
# pushes — which then triggers auto-tag.yml → release.yml.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver (e.g. 0.2.0 or 1.0.0-beta01). Without the v prefix.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  bump:
    name: Write VERSION + push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate version
        id: v
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ -z "$VERSION" ]]; then
            echo "Version input required" >&2
            exit 1
          fi
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "Invalid semver: $VERSION" >&2
            exit 1
          fi
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists" >&2
            exit 1
          fi
          CURRENT="$(cat VERSION | tr -d '[:space:]')"
          if [[ "$CURRENT" == "$VERSION" ]]; then
            echo "VERSION file already contains $VERSION — nothing to bump" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "previous=$CURRENT" >> "$GITHUB_OUTPUT"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Write VERSION + commit + push
        run: |
          echo "${{ steps.v.outputs.version }}" > VERSION
          git add VERSION
          git commit -m "Bump ${{ steps.v.outputs.previous }} → ${{ steps.v.outputs.version }}"
          git push origin HEAD:main
          echo "Pushed to main — auto-tag.yml will tag v${{ steps.v.outputs.version }}"

      - name: Emit summary
        run: |
          {
            echo "### Bump complete"
            echo ""
            echo "- Previous: \`${{ steps.v.outputs.previous }}\`"
            echo "- New: \`${{ steps.v.outputs.version }}\`"
            echo "- Next: \`auto-tag.yml\` will now create \`v${{ steps.v.outputs.version }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
