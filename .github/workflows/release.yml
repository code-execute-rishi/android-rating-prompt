name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # required for creating GitHub Releases

jobs:
  release:
    name: Build + publish release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing $TAG (version $VERSION)"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Bootstrap Gradle wrapper
        run: gradle wrapper --gradle-version 8.10.2

      - name: Run unit tests
        run: ./gradlew :library:testDebugUnitTest

      - name: Assemble release AAR
        run: ./gradlew :library:assembleRelease

      - name: Generate sources + javadoc jars
        run: ./gradlew :library:sourcesJar :library:javadocJar || ./gradlew :library:androidSourcesJar :library:androidJavadocJar || true

      - name: Publish to Maven Local (sanity check JitPack config)
        run: ./gradlew :library:publishToMavenLocal

      - name: Collect release artifacts
        run: |
          mkdir -p dist
          cp library/build/outputs/aar/*.aar dist/ 2>/dev/null || true
          cp library/build/libs/*.jar dist/ 2>/dev/null || true
          ls -la dist/

      - name: Generate changelog entry
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "## What's new in ${{ steps.version.outputs.tag }}" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          if [ -n "$PREV_TAG" ]; then
            echo "Changes since \`$PREV_TAG\`:" >> RELEASE_NOTES.md
            echo "" >> RELEASE_NOTES.md
            git log "$PREV_TAG..HEAD" --pretty=format:"- %s (%h)" --no-merges >> RELEASE_NOTES.md
          else
            echo "Initial release." >> RELEASE_NOTES.md
          fi
          echo "" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "## Install via JitPack" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "\`\`\`groovy" >> RELEASE_NOTES.md
          echo "implementation 'com.github.${{ github.repository_owner }}:${{ github.event.repository.name }}:${{ steps.version.outputs.version }}'" >> RELEASE_NOTES.md
          echo "\`\`\`" >> RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          files: dist/*

      - name: Pre-warm JitPack build cache
        continue-on-error: true
        run: |
          COORD="com.github.${{ github.repository_owner }}/${{ github.event.repository.name }}/${{ steps.version.outputs.version }}"
          echo "Triggering JitPack build for $COORD"
          curl -sSL --max-time 600 \
            "https://jitpack.io/api/builds/com.github.${{ github.repository_owner }}/${{ github.event.repository.name }}/${{ steps.version.outputs.version }}" \
            || true
          # Requesting the POM directly forces JitPack to start the build if not already built.
          curl -sSL --max-time 600 \
            "https://jitpack.io/com/github/${{ github.repository_owner }}/${{ github.event.repository.name }}/${{ steps.version.outputs.version }}/${{ github.event.repository.name }}-${{ steps.version.outputs.version }}.pom" \
            -o jitpack.pom || true
          echo "JitPack pre-warm requested"
