name: Release

# Triggers:
#   1. push a v*.*.* tag manually — standard path
#   2. auto-tag.yml calls `gh workflow run release.yml -f tag=v...` after
#      creating a tag via GITHUB_TOKEN. This indirection is required because
#      pushes made with the default GITHUB_TOKEN never trigger downstream
#      push/tag workflows. workflow_dispatch is an explicit exception.
#
# Both paths end up checking out the tag and building the release artifacts.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.0). Must already exist.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build + publish release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Resolve tag
        id: version
        run: |
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "Invalid tag: $TAG" >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing $TAG (version $VERSION)"

      - name: Checkout at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.version.outputs.tag }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Bootstrap Gradle wrapper
        run: gradle wrapper --gradle-version 8.10.2

      - name: Run unit tests
        run: ./gradlew :library:testDebugUnitTest

      - name: Assemble release AAR
        run: ./gradlew :library:assembleRelease

      - name: Publish to Maven Local (JitPack config sanity check)
        run: ./gradlew :library:publishReleasePublicationToMavenLocal

      - name: Collect release artifacts
        run: |
          mkdir -p dist
          cp library/build/outputs/aar/*.aar dist/ 2>/dev/null || true
          find ~/.m2/repository/com/github -name '*.jar' -exec cp {} dist/ \; 2>/dev/null || true
          find ~/.m2/repository/com/github -name '*.pom' -exec cp {} dist/ \; 2>/dev/null || true
          ls -la dist/

      - name: Generate changelog entry
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          # Find previous tag excluding the current one
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^$TAG$" | head -n1 || echo "")
          {
            echo "## What's new in $TAG"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              echo "Changes since \`$PREV_TAG\`:"
              echo ""
              git log "$PREV_TAG..$TAG" --pretty=format:"- %s (%h)" --no-merges
            else
              echo "Initial release."
            fi
            echo ""
            echo ""
            echo "## Install via JitPack"
            echo ""
            echo '```groovy'
            echo "implementation 'com.github.${{ github.repository_owner }}:${{ github.event.repository.name }}:$VERSION'"
            echo '```'
          } > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          files: dist/*

      - name: Pre-warm JitPack build cache
        continue-on-error: true
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          VERSION="${{ steps.version.outputs.version }}"
          echo "Triggering JitPack build for com.github.$OWNER/$REPO/$VERSION"
          # Fetching the POM forces JitPack to start the build if not already built.
          # 10-minute timeout is generous since JitPack may be compiling from source.
          curl -sSL --max-time 600 \
            "https://jitpack.io/com/github/$OWNER/$REPO/$VERSION/$REPO-$VERSION.pom" \
            -o jitpack.pom || true
          # Also hit the build status endpoint so the log appears in JitPack UI.
          curl -sSL --max-time 60 \
            "https://jitpack.io/api/builds/com.github.$OWNER/$REPO/$VERSION" || true
          echo "JitPack pre-warm requested"

      - name: Emit summary
        run: |
          {
            echo "### Release ${{ steps.version.outputs.tag }} shipped"
            echo ""
            echo "- Artifacts: uploaded to GitHub Release"
            echo "- JitPack: https://jitpack.io/#${{ github.repository }}/${{ steps.version.outputs.version }}"
            echo ""
            echo '```groovy'
            echo "implementation 'com.github.${{ github.repository }}:${{ steps.version.outputs.version }}'"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
