name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build + test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Bootstrap Gradle wrapper (first run)
        run: gradle wrapper --gradle-version 8.10.2

      - name: Lint
        run: ./gradlew :library:lint :exampleapp:lint

      - name: Unit tests
        run: ./gradlew :library:testDebugUnitTest

      - name: Assemble library (release AAR)
        run: ./gradlew :library:assembleRelease

      - name: Assemble example app (debug APK)
        run: ./gradlew :exampleapp:assembleDebug

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v7
        if: github.ref == 'refs/heads/main'
        with:
          name: library-aar
          path: library/build/outputs/aar/*.aar
          retention-days: 14

      - name: Upload lint reports on failure
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: lint-reports
          path: '**/build/reports/lint-results*.html'
          retention-days: 7
