jdk:
  - openjdk17
before_install:
  - export SDKMANAGER="${ANDROID_HOME:-${ANDROID_SDK_ROOT}}/cmdline-tools/latest/bin/sdkmanager"; if [ ! -x "$SDKMANAGER" ]; then SDKMANAGER="$(command -v sdkmanager)"; fi; yes | "$SDKMANAGER" --licenses >/dev/null
  - export SDKMANAGER="${ANDROID_HOME:-${ANDROID_SDK_ROOT}}/cmdline-tools/latest/bin/sdkmanager"; if [ ! -x "$SDKMANAGER" ]; then SDKMANAGER="$(command -v sdkmanager)"; fi; "$SDKMANAGER" "platforms;android-37.0" "build-tools;37.0.0"
install:
  - ./gradlew :library:publishReleasePublicationToMavenLocal
